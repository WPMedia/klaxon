name: klaxon
namespace: siteeng-lincoln
type: ecs
environments:
  - name: staging
    resources:
      - vendor: aws
        resource: simple
        settings:
          scheme: internal
          domain: klaxon-staging.wpit.nile.works
          parent_domain: wpit.nile.works
          certificate: arn:aws:iam::766513428554:server-certificate/star.wpit.nile.works_4-3-2018
          healthcheck:
            path: "/healthcheck"
    override:
      services:
        app:
